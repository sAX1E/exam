version: '3.8'

services:
  app:
    image: kachmazov1234/medsait-app:dev
    container_name: medsait-app-stage
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FLASK_ENV=stage
      - DATA_DIR=/app/data
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:latest
    container_name: redis-stage
    ports:
      - "6379:6379"
    volumes:
      - redis_data_stage:/data
    restart: unless-stopped

volumes:
  redis_data_stage:
